  <!-- Toast 訊息提示 -->

    <i id="toast-icon" class="fa-solid fa-circle-check text-orange-400"></i>
    <span id="toast-message">提示訊息</span>

  <script>
    // --- Toast 提示功能 ---
    function showToast(message, type = 'success') {
      const toast = document.getElementById('toast');
      const icon = document.getElementById('toast-icon');
      const msg = document.getElementById('toast-message');
      
      msg.textContent = message;
      if (type === 'error') {
        icon.className = 'fa-solid fa-circle-xmark text-red-400';
      } else {
        icon.className = 'fa-solid fa-circle-check text-orange-400';
      }
      
      toast.classList.remove('opacity-0');
      toast.classList.add('opacity-100');
      
      setTimeout(() => {
        toast.classList.remove('opacity-100');
        toast.classList.add('opacity-0');
      }, 3000);
    }

    // --- HTML5 Canvas 塗鴉/簽名板程式 ---
    const canvases = {
      'draw-canvas': { ctx: null, drawing: false, lastX: 0, lastY: 0 },
      'sig-canvas': { ctx: null, drawing: false, lastX: 0, lastY: 0 }
    };
    
    let currentTool = 'draw'; // 'draw' 或 'erase'
    let currentColor = '#000000';
    let currentLineWidth = 2;

    function initCanvases() {
      Object.keys(canvases).forEach(id => {
        const canvas = document.getElementById(id);
        const ctx = canvas.getContext('2d');
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        canvases[id].ctx = ctx;

        // 計算縮放後的滑鼠位置
        const getPos = (e, canvas) => {
          const rect = canvas.getBoundingClientRect();
          const clientX = e.touches ? e.touches[0].clientX : e.clientX;
          const clientY = e.touches ? e.touches[0].clientY : e.clientY;
          // 將畫布的 client 座標轉換為 canvas 的實體解析度座標
          return {
            x: (clientX - rect.left) * (canvas.width / rect.width),
            y: (clientY - rect.top) * (canvas.height / rect.height)
          };
        };

        const drawStart = (e) => {
          e.preventDefault();
          const pos = getPos(e, canvas);
          canvases[id].drawing = true;
          canvases[id].lastX = pos.x;
          canvases[id].lastY = pos.y;
        };

        const drawMove = (e) => {
          if (!canvases[id].drawing) return;
          e.preventDefault();
          const pos = getPos(e, canvas);
          const ctx = canvases[id].ctx;

          ctx.beginPath();
          ctx.moveTo(canvases[id].lastX, canvases[id].lastY);
          ctx.lineTo(pos.x, pos.y);

          // 設置工具樣式
          if (id === 'sig-canvas') {
            ctx.strokeStyle = '#1e293b'; // 簽名一律深灰藍
            ctx.lineWidth = 2.5;
          } else {
            ctx.strokeStyle = currentTool === 'erase' ? '#ffffff' : currentColor;
            ctx.lineWidth = currentTool === 'erase' ? 15 : currentLineWidth;
          }

          ctx.stroke();
          
          canvases[id].lastX = pos.x;
          canvases[id].lastY = pos.y;
        };

        const drawEnd = () => {
          if (canvases[id].drawing) {
            canvases[id].drawing = false;
            // 繪製結束後，儲存畫布內容
            saveCanvasToStorage(id);
          }
        };

        // 滑鼠事件
        canvas.addEventListener('mousedown', drawStart);
        canvas.addEventListener('mousemove', drawMove);
        window.addEventListener('mouseup', drawEnd);

        // 觸控事件
        canvas.addEventListener('touchstart', drawStart, { passive: false });
        canvas.addEventListener('touchmove', drawMove, { passive: false });
        window.addEventListener('touchend', drawEnd);
      });
      
      // 更新顏色工具高亮
      updateColorSelector();
      setTool('draw');
    }

    function setTool(tool) {
      currentTool = tool;
      document.getElementById('tool-draw').className = `p-2 rounded-lg text-xs font-bold flex items-center gap-1.5 transition ${tool === 'draw' ? 'bg-orange-500 text-white shadow-sm' : 'bg-slate-100 text-slate-600 hover:bg-slate-200'}`;
      document.getElementById('tool-erase').className = `p-2 rounded-lg text-xs font-bold flex items-center gap-1.5 transition ${tool === 'erase' ? 'bg-orange-500 text-white shadow-sm' : 'bg-slate-100 text-slate-600 hover:bg-slate-200'}`;
    }

    function setColor(color) {
      currentColor = color;
      setTool('draw');
      updateColorSelector();
    }

    function updateColorSelector() {
      const colors = {
        '#000000': 'color-black',
        '#ef4444': 'color-red',
        '#3b82f6': 'color-blue',
        '#10b981': 'color-green'
      };
      Object.keys(colors).forEach(c => {
        const btn = document.getElementById(colors[c]);
        if (c === currentColor) {
          btn.classList.add('ring-orange-500', 'scale-110');
        } else {
          btn.classList.remove('ring-orange-500', 'scale-110');
        }
      });
    }

    function clearCanvas(id) {
      const canvas = document.getElementById(id);
      const ctx = canvases[id].ctx;
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      saveCanvasToStorage(id);
    }

    // 將 Canvas 儲存為 DataURL 放在 localStorage 中，實現斷電續寫
    function saveCanvasToStorage(id) {
      const canvas = document.getElementById(id);
      localStorage.setItem('scam_agent_canvas_' + id, canvas.toDataURL());
    }

    function loadCanvasFromStorage(id) {
      const dataUrl = localStorage.getItem('scam_agent_canvas_' + id);
      if (dataUrl) {
        const img = new Image();
        img.src = dataUrl;
        img.onload = () => {
          canvases[id].ctx.drawImage(img, 0, 0);
        };
      }
    }

    // --- 單選回饋功能 ---
    let currentFeedback = 0;
    function setFeedback(index) {
      currentFeedback = index;
      localStorage.setItem('scam_agent_feedback', index);
      
      const r1 = document.getElementById('radio-1');
      const rDot1 = document.getElementById('radio-dot-1');
      const r2 = document.getElementById('radio-2');
      const rDot2 = document.getElementById('radio-dot-2');
      
      if (index === 1) {
        r1.className = 'w-5 h-5 rounded-full border-2 border-orange-500 flex items-center justify-center flex-shrink-0 mt-0.5 transition';
        rDot1.className = 'w-2.5 h-2.5 rounded-full bg-orange-500 scale-100 transition';
        r2.className = 'w-5 h-5 rounded-full border-2 border-slate-300 flex items-center justify-center flex-shrink-0 mt-0.5 transition';
        rDot2.className = 'w-2.5 h-2.5 rounded-full bg-orange-500 scale-0 transition';
      } else if (index === 2) {
        r1.className = 'w-5 h-5 rounded-full border-2 border-slate-300 flex items-center justify-center flex-shrink-0 mt-0.5 transition';
        rDot1.className = 'w-2.5 h-2.5 rounded-full bg-orange-500 scale-0 transition';
        r2.className = 'w-5 h-5 rounded-full border-2 border-orange-500 flex items-center justify-center flex-shrink-0 mt-0.5 transition';
        rDot2.className = 'w-2.5 h-2.5 rounded-full bg-orange-500 scale-100 transition';
      }
    }

    // --- 本地快取儲存 ---
    const textIds = ['q_tips', 'q_hotline', 'wish-input', 'student-class', 'student-name'];
    
    function initStorage() {
      // 文字欄位載入
      textIds.forEach(id => {
        const saved = localStorage.getItem('scam_agent_' + id);
        if (saved !== null) {
          document.getElementById(id).value = saved;
        }
        
        document.getElementById(id).addEventListener('input', (e) => {
          localStorage.setItem('scam_agent_' + id, e.target.value);
        });
      });

      // 回饋狀態載入
      const savedFb = localStorage.getItem('scam_agent_feedback');
      if (savedFb) {
        setFeedback(parseInt(savedFb));
      }

      // Canvas 載入
      loadCanvasFromStorage('draw-canvas');
      loadCanvasFromStorage('sig-canvas');
    }

    // --- 一鍵重設學習單 ---
    document.getElementById('btn-clear').addEventListener('click', () => {
      if (confirm('確定要清除所有填寫的內容與畫布嗎？')) {
        textIds.forEach(id => {
          localStorage.removeItem('scam_agent_' + id);
          document.getElementById(id).value = '';
        });
        
        localStorage.removeItem('scam_agent_feedback');
        // 重設單選框外觀
        const r1 = document.getElementById('radio-1');
        const rDot1 = document.getElementById('radio-dot-1');
        const r2 = document.getElementById('radio-2');
        const rDot2 = document.getElementById('radio-dot-2');
        r1.className = 'w-5 h-5 rounded-full border-2 border-slate-300 flex items-center justify-center flex-shrink-0 mt-0.5 transition';
        rDot1.className = 'w-2.5 h-2.5 rounded-full bg-orange-500 scale-0 transition';
        r2.className = 'w-5 h-5 rounded-full border-2 border-slate-300 flex items-center justify-center flex-shrink-0 mt-0.5 transition';
        rDot2.className = 'w-2.5 h-2.5 rounded-full bg-orange-500 scale-0 transition';
        currentFeedback = 0;

        clearCanvas('draw-canvas');
        clearCanvas('sig-canvas');
        showToast('學習單與畫布已全部重設！');
      }
    });

    // --- 一鍵下載 PNG ---
    document.getElementById('btn-download').addEventListener('click', async () => {
      const captureArea = document.getElementById('capture-area');
      const downloadBtn = document.getElementById('btn-download');
      
      const originalBtnText = downloadBtn.innerHTML;
      downloadBtn.innerHTML = `<i class="fa-solid fa-spinner animate-spin"></i> 正在生成學習單...`;
      downloadBtn.disabled = true;

      // 1. 固定寬度
      const originalStyleWidth = captureArea.style.width;
      const originalStyleMaxWidth = captureArea.style.maxWidth;
      captureArea.style.width = '1024px';
      captureArea.style.maxWidth = '1024px';

      // 2. 替換學生資訊
      const classInput = document.getElementById('student-class');
      const nameInput = document.getElementById('student-name');
      const classVal = classInput.value || '未填寫';
      const nameVal = nameInput.value || '未填寫';

      const printInfoDiv = document.createElement('div');
      printInfoDiv.id = 'temp-student-info-print';
      printInfoDiv.className = 'flex gap-6 items-center text-slate-700 text-sm font-extrabold flex-shrink-0';
      printInfoDiv.innerHTML = `<div>班級：<span class="border-b border-slate-400 pb-0.5 px-3 text-orange-600 font-extrabold text-sm">${classVal}</span></div>` +
                               `<div>姓名：<span class="border-b border-slate-400 pb-0.5 px-3 text-orange-600 font-extrabold text-sm">${nameVal}</span></div>`;

      const inputsWrapper = document.getElementById('class-name-inputs');
      inputsWrapper.style.display = 'none';
      inputsWrapper.parentNode.insertBefore(printInfoDiv, inputsWrapper);

      // 3. 替換 2 個 textarea 為對齊良好的靜態文字方格
      const tempTaElements = [];
      const textareas = ['q_tips', 'q_hotline'];
      textareas.forEach(id => {
        const ta = document.getElementById(id);
        const val = ta.value || '（未填寫）';
        
        const tDiv = document.createElement('div');
        tDiv.className = 'w-full bg-white border border-slate-200 rounded-xl p-4 text-xs text-orange-700 font-semibold min-h-[100px] flex items-center whitespace-pre-wrap shadow-inner leading-relaxed';
        tDiv.textContent = val;
        
        ta.style.display = 'none';
        ta.parentNode.insertBefore(tDiv, ta);
        tempTaElements.push({ original: ta, temp: tDiv });
      });

      // 4. 替換願望祝福願望為下劃線靜態文字，避免 input 下沉
      const wishInput = document.getElementById('wish-input');
      const wishVal = wishInput.value || '（未填寫）';
      const wishSpan = document.createElement('span');
      wishSpan.className = 'border-b border-slate-400 pb-0.5 px-2 text-orange-600 font-extrabold text-xs mx-1';
      wishSpan.textContent = wishVal;
      
      wishInput.style.display = 'none';
      wishInput.parentNode.insertBefore(wishSpan, wishInput);

      // 5. 擷取
      try {
        const canvas = await html2canvas(captureArea, {
          scale: 2,
          windowWidth: 1024,
          backgroundColor: '#f8fafc',
          useCORS: true,
          allowTaint: false,
          logging: false,
          ignoreElements: (element) => {
            // 忽略吉祥物與外部字型 link 以防 CORS 污染 canvas 導致匯出失敗
            return element.id === 'draggable-mascot' || 
                   (element.tagName === 'LINK' && element.href && element.href.includes('fonts.googleapis.com')) ||
                   (element.tagName === 'LINK' && element.href && element.href.includes('fonts.gstatic.com'));
          }
        });

        const link = document.createElement('a');
        link.download = `金融防詐_活動四_防詐行動家_${nameVal}.png`;
        link.href = canvas.toDataURL('image/png');
        link.click();
        
        showToast('學習單成果下載成功！');
      } catch (err) {
        console.error('擷取失敗：', err);
        showToast('產生圖片失敗，請重試。', 'error');
      } finally {
        // 6. 還原
        captureArea.style.width = originalStyleWidth;
        captureArea.style.maxWidth = originalStyleMaxWidth;

        printInfoDiv.remove();
        inputsWrapper.style.display = 'flex';

        tempTaElements.forEach(item => {
          item.temp.remove();
          item.original.style.display = 'block';
        });

        wishSpan.remove();
        wishInput.style.display = 'inline-block';

        downloadBtn.innerHTML = originalBtnText;
        downloadBtn.disabled = false;
      }
    });

    // 初始化畫布與快取資料
    window.onload = () => {
      initCanvases();
      initStorage();
    };
  </script>

  


  <!-- 可拖曳吉祥物 LiyuChillGuy 開始 -->
  <style>
    /* 吉祥物發光與抖動樣式 */
    @keyframes neon-rainbow {
      0% { filter: drop-shadow(0 0 6px rgba(239, 68, 68, 0.9)); }
      20% { filter: drop-shadow(0 0 6px rgba(249, 115, 22, 0.9)); }
      40% { filter: drop-shadow(0 0 6px rgba(234, 179, 8, 0.9)); }
      60% { filter: drop-shadow(0 0 6px rgba(16, 185, 129, 0.9)); }
      80% { filter: drop-shadow(0 0 6px rgba(59, 130, 246, 0.9)); }
      100% { filter: drop-shadow(0 0 6px rgba(139, 92, 246, 0.9)); }
    }
    @keyframes mascot-shake {
      0% { transform: scale(1) rotate(0deg); }
      10% { transform: scale(1.05) rotate(-2deg); }
      20% { transform: scale(1.05) rotate(2deg); }
      30% { transform: scale(1.05) rotate(-1deg); }
      40% { transform: scale(1.05) rotate(1deg); }
      50% { transform: scale(1) rotate(0deg); }
    }
    .mascot-neon-shake {
      animation: neon-rainbow 1.5s linear infinite, mascot-shake 0.4s ease-in-out infinite;
    }
  </style>
  <div id="draggable-mascot" class="no-print fixed bottom-6 left-6 z-50 select-none" style="width: 160px; height: 160px; touch-action: none;">
    <img src="image/LiyuChillGuy.svg" alt="LiyuChillGuy" class="w-full h-full object-contain cursor-grab active:cursor-grabbing transition-shadow" id="mascot-img">
  </div>
  <script>
    (function() {
      const mascot = document.getElementById('draggable-mascot');
      const img = document.getElementById('mascot-img');
      const captureArea = document.getElementById('capture-area');

      // 如果有 capture-area，將吉祥物附加到 capture-area 內，使其下載時能被 html2canvas 擷取
      if (captureArea) {
        captureArea.appendChild(mascot);
        mascot.style.position = 'absolute';
      } else {
        mascot.style.position = 'fixed';
      }

      // hover 效果
      img.addEventListener('mouseenter', () => img.classList.add('mascot-neon-shake'));
      img.addEventListener('mouseleave', () => img.classList.remove('mascot-neon-shake'));

      let isDragging = false;
      let startX, startY, initialLeft, initialTop;

      const dragStart = (e) => {
        isDragging = true;
        img.classList.add('mascot-neon-shake');

        if (captureArea) {
          initialLeft = mascot.offsetLeft;
          initialTop = mascot.offsetTop;
        } else {
          const rect = mascot.getBoundingClientRect();
          initialLeft = rect.left;
          initialTop = rect.top;
        }

        startX = e.touches ? e.touches[0].clientX : e.clientX;
        startY = e.touches ? e.touches[0].clientY : e.clientY;

        mascot.style.bottom = 'auto';
        mascot.style.left = initialLeft + 'px';
        mascot.style.top = initialTop + 'px';
      };

      const dragMove = (e) => {
        if (!isDragging) return;
        e.preventDefault();

        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;

        const dx = clientX - startX;
        const dy = clientY - startY;

        let newLeft = initialLeft + dx;
        let newTop = initialTop + dy;

        if (captureArea) {
          const parentRect = captureArea.getBoundingClientRect();
          const mascotRect = mascot.getBoundingClientRect();
          if (newLeft < 0) newLeft = 0;
          if (newLeft > parentRect.width - mascotRect.width) newLeft = parentRect.width - mascotRect.width;
          if (newTop < 0) newTop = 0;
          if (newTop > parentRect.height - mascotRect.height) newTop = parentRect.height - mascotRect.height;
        } else {
          const mascotRect = mascot.getBoundingClientRect();
          if (newLeft < 0) newLeft = 0;
          if (newLeft > window.innerWidth - mascotRect.width) newLeft = window.innerWidth - mascotRect.width;
          if (newTop < 0) newTop = 0;
          if (newTop > window.innerHeight - mascotRect.height) newTop = window.innerHeight - mascotRect.height;
        }

        mascot.style.left = newLeft + 'px';
        mascot.style.top = newTop + 'px';
      };

      const dragEnd = () => {
        isDragging = false;
        img.classList.remove('mascot-neon-shake');
        
        const pageKey = 'scam_mascot_pos_' + window.location.pathname.split('/').pop().replace('.html', '');
        localStorage.setItem(pageKey, JSON.stringify({ left: mascot.style.left, top: mascot.style.top }));
      };

      mascot.addEventListener('mousedown', dragStart);
      window.addEventListener('mousemove', dragMove);
      window.addEventListener('mouseup', dragEnd);

      mascot.addEventListener('touchstart', dragStart, { passive: true });
      window.addEventListener('touchmove', dragMove, { passive: false });
      window.addEventListener('touchend', dragEnd);

      // 載入該頁之前擺放的位置
      const pageKey = 'scam_mascot_pos_' + window.location.pathname.split('/').pop().replace('.html', '');
      const savedPos = localStorage.getItem(pageKey);
      if (savedPos) {
        try {
          const pos = JSON.parse(savedPos);
          mascot.style.bottom = 'auto';
          mascot.style.left = pos.left;
          mascot.style.top = pos.top;
        } catch (err) {}
      }
    })();
  </script>
  <!-- 可拖曳吉祥物 LiyuChillGuy 結束 -->
