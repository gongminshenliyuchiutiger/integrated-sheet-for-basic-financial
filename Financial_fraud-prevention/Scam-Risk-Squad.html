    // --- Toast 提示功能 ---
    function showToast(message, type = 'success') {
      const toast = document.getElementById('toast');
      const icon = document.getElementById('toast-icon');
      const msg = document.getElementById('toast-message');
      
      msg.textContent = message;
      if (type === 'error') {
        icon.className = 'fa-solid fa-circle-xmark text-red-400';
      } else {
        icon.className = 'fa-solid fa-circle-check text-orange-400';
      }
      
      toast.classList.remove('opacity-0');
      toast.classList.add('opacity-100');
      
      setTimeout(() => {
        toast.classList.remove('opacity-100');
        toast.classList.add('opacity-0');
      }, 3000);
    }

          title: "案例二：遙控器重複訂購案",
          story: "基隆市的廖姓女子在購物網站購買新臺幣 900 元手機自拍遙控器 1 組，隔天接到賣家電話，稱重複訂購商品，要趕快取消，接著又接到郵局經理電話，告知其個資外洩，恐遭盜領存款，要求趕快將存款提領並購買 GASH+ 點數來進行帳戶金流驗證，廖女一共購買 4 次共 42 張新臺幣 5,000 元的遊戲點數卡告知帳密，帳戶只剩下 300 元。"
        }
      },
      5: {
        name: "偵探五組",
        type: "假中獎通知詐騙",
        formula: ["簡訊/社群中獎通知", "誘導填寫個資", "要付手續費/擔保金", "錢財得手封鎖"],
        keywords: ["抽中最新 iPhone", "票選活動得獎", "需預先支付稅金", "升級金流認證", "匯款後失聯"],
        case1: {
          title: "案例一：幸運抽中 iPhone 案",
          story: "某被害人突然收到一封簡訊通知：「恭喜您在我們的感恩活動中抽中最新型 iPhone 15 Pro！請點擊以下連結填寫收件資料。」被害人非常高興，點進連結填寫了個人姓名、電話、地址以及身份證字號。隔天接到客服人員來電，聲稱中獎獎品需要先繳納 10% 的境外贈與稅，共需 3,500 元。被害人依言匯款後，對方又說金流審核失敗，需要提供第二張提款卡來進行認證。被害人開始起疑，拒絕提供，結果就被對方拉黑，再也聯絡不上了。"
        },
        case2: {
          title: "案例二：網路平台中獎擔保金案",
          story: "學生在臉書參加分享留言抽獎活動，隨後收到中獎通知，說抽中了 5,000 元郵政禮券與大禮包。但點進去填寫資料後，系統顯示：「由於防洗錢規範，中獎人必須先提供一筆 1,000 元的擔保金至指定帳戶，以證明是本人實名領取，系統在確認後會連同 5,000 元禮券一併退還。」學生信以為真匯款，隨後對方又說轉帳備註沒寫「實名認證」，必須重新匯款 2,000 元，否則帳戶會被列為異常，學生前後被騙了 3,000 元才驚覺上當。"
        }
      },
      6: {
        name: "偵探六組",
        type: "假檢警詐騙",
        formula: ["個資外洩涉及刑案", "假公務員電話恐嚇", "監管帳戶/偵查不公開", "轉帳/面交款項"],
        keywords: ["健保卡被盜刷", "電話門號涉洗錢案", "法院公證帳戶", "法務部書記官面交", "偵查不公開不得外洩"],
        case1: {
          title: "案例一：健保卡涉案監管案",
          story: "李小姐接獲電話自稱某醫院，說有人持她的健保卡冒領藥物。隨後電話轉接給自稱台北市刑警大隊的陳警官，說她的名下多個銀行帳戶涉嫌內線交易及洗錢。陳警官聲稱此案涉及國家機密，依「偵查不公開」絕對不能告訴家人，否則直接收押。隨後林檢察官要求李小姐將名下存款全部提領，於下午在超商面交給法務部書記官進行「公證代管」，辦案完成會全數歸還，李小姐因此被騙走 420 萬元。"
        },
        case2: {
          title: "案例二：銷帳退款操作 ATM 案",
          story: "某位 28 歲銀行行員在臉書買手機付款 1 萬 5 千元後發現被騙，報案 1 個月後接到警察來電，表示已經破案，只要開通提款卡的「銷帳功能」就可以領回被騙款項，請該名行員按照來電指示操作 ATM 辦理，結果存款又被轉走 3 萬元。"
        }
      }
    };

    let activeSquad = 1;

    // --- 初始化 UI ---
    function initSquads() {
      for (let i = 1; i <= 6; i++) {
        const btn = document.getElementById('btn-squad-' + i);
        btn.textContent = squadData[i].name;
      }
      setSquad(1);
    }

    // --- 切換特攻偵查組 ---
    function setSquad(sId) {
      activeSquad = sId;

      // 更新分頁 Tab 高亮
      for (let i = 1; i <= 6; i++) {
        const btn = document.getElementById('btn-squad-' + i);
        if (i === sId) {
          btn.className = "no-print px-3 py-2 rounded-xl text-[11px] font-extrabold border bg-orange-500 border-orange-500 text-white shadow-sm transition";
        } else {
          btn.className = "no-print px-3 py-2 rounded-xl text-[11px] font-extrabold border bg-white border-slate-200 text-slate-600 hover:bg-slate-50 transition";
        }
      }

      const currentSquad = squadData[sId];

      // 更新大標題與類型標籤
      document.getElementById('current-squad-label').textContent = `${currentSquad.name}：負責偵辦 ${currentSquad.type}`;

      // 渲染犯罪公式流程
      const flowContainer = document.getElementById('formula-flow-container');
      flowContainer.innerHTML = '';
      currentSquad.formula.forEach((step, idx) => {
        // 插入流程文字卡
        const stepDiv = document.createElement('div');
        stepDiv.className = "bg-white border border-rose-100 rounded-lg px-3 py-1.5 text-xs font-extrabold text-rose-700 shadow-sm flex items-center justify-center";
        stepDiv.textContent = step;
        flowContainer.appendChild(stepDiv);

        // 如果不是最後一個，插入右向箭頭
        if (idx < currentSquad.formula.length - 1) {
          const arrow = document.createElement('div');
          arrow.className = "text-rose-400 font-black text-xs flex items-center";
          arrow.innerHTML = `<i class="fa-solid fa-angles-right"></i>`;
          flowContainer.appendChild(arrow);
        }
      });

      // 渲染犯罪話術手法標籤
      const keywordsContainer = document.getElementById('keywords-container');
      keywordsContainer.innerHTML = '';
      currentSquad.keywords.forEach(kw => {
        const kwSpan = document.createElement('span');
        kwSpan.className = "bg-slate-100 text-slate-700 border border-slate-200 rounded-full px-3 py-1 text-[10px] font-bold";
        kwSpan.textContent = kw;
        keywordsContainer.appendChild(kwSpan);
      });

      // 載入案例內容
      document.getElementById('case-title-1').textContent = currentSquad.case1.title;
      document.getElementById('case-story-1').textContent = currentSquad.case1.story;
      
      document.getElementById('case-title-2').textContent = currentSquad.case2.title;
      document.getElementById('case-story-2').textContent = currentSquad.case2.story;

      // 載入該組的填寫數據
      loadAnswersForSquad();
    }

    // --- 載入與同步填寫內容 ---
    const squadInputs = [
      'ans-squad-1', 'detective-name-1',
      'ans-squad-2', 'detective-name-2'
    ];

    function loadAnswersForSquad() {
      // 載入學生的班級與姓名 (全組共用)
      document.getElementById('student-class').value = localStorage.getItem('scam_squad_class') || '';
      document.getElementById('student-name').value = localStorage.getItem('scam_squad_name') || '';

      // 載入本 Tab 文字框答案
      squadInputs.forEach(id => {
        const key = `scam_squad_g${activeSquad}_${id}`;
        const val = localStorage.getItem(key) || '';
        document.getElementById(id).value = val;
      });
    }

    // 監聽輸入
    squadInputs.forEach(id => {
      document.getElementById(id).addEventListener('input', (e) => {
        localStorage.setItem(`scam_squad_g${activeSquad}_${id}`, e.target.value);
      });
    });

    document.getElementById('student-class').addEventListener('input', (e) => {
      localStorage.setItem('scam_squad_class', e.target.value);
    });
    document.getElementById('student-name').addEventListener('input', (e) => {
      localStorage.setItem('scam_squad_name', e.target.value);
    });

    // --- 一鍵重設學習單 ---
    document.getElementById('btn-clear').addEventListener('click', () => {
      if (confirm(`確定要清除【${squadData[activeSquad].name}】的所有案例解析與偵探簽名嗎？`)) {
        squadInputs.forEach(id => {
          localStorage.removeItem(`scam_squad_g${activeSquad}_${id}`);
          document.getElementById(id).value = '';
        });
        showToast('本組作答已重設！');
      }
    });

    // --- 一鍵下載 PNG (對齊校正、防裁切版) ---
    document.getElementById('btn-download').addEventListener('click', async () => {
      const captureArea = document.getElementById('capture-area');
      const downloadBtn = document.getElementById('btn-download');
      
      const originalBtnText = downloadBtn.innerHTML;
      downloadBtn.innerHTML = `<i class="fa-solid fa-spinner animate-spin"></i> 正在生成學習單...`;
      downloadBtn.disabled = true;

      // 1. 強制固定擷取寬度
      const originalStyleWidth = captureArea.style.width;
      const originalStyleMaxWidth = captureArea.style.maxWidth;
      captureArea.style.width = '1024px';
      captureArea.style.maxWidth = '1024px';

      // 2. 暫時替換「班級、姓名」輸入框為印刷下劃線文字
      const classInput = document.getElementById('student-class');
      const nameInput = document.getElementById('student-name');
      const classVal = classInput.value || '未填寫';
      const nameVal = nameInput.value || '未填寫';

      const printInfoDiv = document.createElement('div');
      printInfoDiv.id = 'temp-student-info-print';
      printInfoDiv.className = 'flex gap-6 items-center text-slate-700 text-sm font-extrabold flex-shrink-0';
      printInfoDiv.innerHTML = `<div>班級：<span class="border-b border-slate-400 pb-0.5 px-3 text-orange-600 font-extrabold text-sm">${classVal}</span></div>` +
                               `<div>姓名：<span class="border-b border-slate-400 pb-0.5 px-3 text-orange-600 font-extrabold text-sm">${nameVal}</span></div>`;

      const inputsWrapper = document.getElementById('class-name-inputs');
      inputsWrapper.style.display = 'none';
      inputsWrapper.parentNode.insertBefore(printInfoDiv, inputsWrapper);

      // 3. 暫時替換案例解析與偵探簽名輸入框
      const tempElements = [];
      const textareas = ['ans-squad-1', 'ans-squad-2'];
      const inputs = ['detective-name-1', 'detective-name-2'];

      // textareas -> div
      textareas.forEach(id => {
        const ta = document.getElementById(id);
        const val = ta.value || '（未填寫）';
        const tDiv = document.createElement('div');
        tDiv.className = 'w-full bg-white border border-slate-200 rounded-xl p-3 text-xs text-orange-700 font-semibold min-h-[80px] flex items-center whitespace-pre-wrap shadow-inner leading-relaxed';
        tDiv.textContent = val;
        ta.style.display = 'none';
        ta.parentNode.insertBefore(tDiv, ta);
        tempElements.push({ original: ta, temp: tDiv });
      });

      // inputs -> span下劃線
      inputs.forEach(id => {
        const inp = document.getElementById(id);
        const val = inp.value || '未簽章';
        const tSpan = document.createElement('span');
        tSpan.className = 'border-b border-slate-400 pb-0.5 px-3 text-orange-600 font-extrabold text-xs';
        tSpan.textContent = val;
        inp.style.display = 'none';
        inp.parentNode.insertBefore(tSpan, inp);
        tempElements.push({ original: inp, temp: tSpan });
      });

      // 4. 擷取
      try {
        const canvas = await html2canvas(captureArea, {
          scale: 2,
          windowWidth: 1024,
          backgroundColor: '#f8fafc',
          useCORS: true,
          allowTaint: true,
          logging: false,
          ignoreElements: (element) => {
            // 忽略吉祥物與外部字型 link 以防 CORS 污染 canvas 導致匯出失敗
            return element.id === 'draggable-mascot' || 
                   (element.tagName === 'LINK' && element.href && element.href.includes('fonts.googleapis.com')) ||
                   (element.tagName === 'LINK' && element.href && element.href.includes('fonts.gstatic.com'));
          }
        });

        // 下載
        const link = document.createElement('a');
        link.download = `金融防詐_活動三_風險管理特攻隊_${squadData[activeSquad].name}_${nameVal}.png`;
        link.href = canvas.toDataURL('image/png');
        link.click();
        
        showToast(`${squadData[activeSquad].name}特攻報告下載成功！`);
      } catch (err) {
        console.error('擷取失敗：', err);
        showToast('產生圖片失敗，請重試。', 'error');
      } finally {
        // 5. 還原 DOM
        captureArea.style.width = originalStyleWidth;
        captureArea.style.maxWidth = originalStyleMaxWidth;

        printInfoDiv.remove();
        inputsWrapper.style.display = 'flex';

        tempElements.forEach(item => {
          item.temp.remove();
          item.original.style.display = 'inline-block';
          if (item.original.tagName === 'TEXTAREA') {
            item.original.style.display = 'block';
          }
        });

        downloadBtn.innerHTML = originalBtnText;
        downloadBtn.disabled = false;
      }
    });

    window.onload = initSquads;
  </script>

  


  <!-- 可拖曳吉祥物 LiyuChillGuy 開始 -->
  <style>
    /* 吉祥物發光與抖動樣式 */
    @keyframes neon-rainbow {
      0% { filter: drop-shadow(0 0 6px rgba(239, 68, 68, 0.9)); }
      20% { filter: drop-shadow(0 0 6px rgba(249, 115, 22, 0.9)); }
      40% { filter: drop-shadow(0 0 6px rgba(234, 179, 8, 0.9)); }
      60% { filter: drop-shadow(0 0 6px rgba(16, 185, 129, 0.9)); }
      80% { filter: drop-shadow(0 0 6px rgba(59, 130, 246, 0.9)); }
      100% { filter: drop-shadow(0 0 6px rgba(139, 92, 246, 0.9)); }
    }
    @keyframes mascot-shake {
      0% { transform: scale(1) rotate(0deg); }
      10% { transform: scale(1.05) rotate(-2deg); }
      20% { transform: scale(1.05) rotate(2deg); }
      30% { transform: scale(1.05) rotate(-1deg); }
      40% { transform: scale(1.05) rotate(1deg); }
      50% { transform: scale(1) rotate(0deg); }
    }
    .mascot-neon-shake {
      animation: neon-rainbow 1.5s linear infinite, mascot-shake 0.4s ease-in-out infinite;
    }
  </style>
  <div id="draggable-mascot" class="no-print fixed bottom-6 left-6 z-50 select-none" style="width: 160px; height: 160px; touch-action: none;">
    <img src="image/LiyuChillGuy.svg" alt="LiyuChillGuy" class="w-full h-full object-contain cursor-grab active:cursor-grabbing transition-shadow" id="mascot-img">
  </div>
  <script>
    (function() {
      const mascot = document.getElementById('draggable-mascot');
      const img = document.getElementById('mascot-img');
      const captureArea = document.getElementById('capture-area');

      // 如果有 capture-area，將吉祥物附加到 capture-area 內，使其下載時能被 html2canvas 擷取
      if (captureArea) {
        captureArea.appendChild(mascot);
        mascot.style.position = 'absolute';
      } else {
        mascot.style.position = 'fixed';
      }

      // hover 效果
      img.addEventListener('mouseenter', () => img.classList.add('mascot-neon-shake'));
      img.addEventListener('mouseleave', () => img.classList.remove('mascot-neon-shake'));

      let isDragging = false;
      let startX, startY, initialLeft, initialTop;

      const dragStart = (e) => {
        isDragging = true;
        img.classList.add('mascot-neon-shake');

        if (captureArea) {
          initialLeft = mascot.offsetLeft;
          initialTop = mascot.offsetTop;
        } else {
          const rect = mascot.getBoundingClientRect();
          initialLeft = rect.left;
          initialTop = rect.top;
        }

        startX = e.touches ? e.touches[0].clientX : e.clientX;
        startY = e.touches ? e.touches[0].clientY : e.clientY;

        mascot.style.bottom = 'auto';
        mascot.style.left = initialLeft + 'px';
        mascot.style.top = initialTop + 'px';
      };

      const dragMove = (e) => {
        if (!isDragging) return;
        e.preventDefault();

        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;

        const dx = clientX - startX;
        const dy = clientY - startY;

        let newLeft = initialLeft + dx;
        let newTop = initialTop + dy;

        if (captureArea) {
          const parentRect = captureArea.getBoundingClientRect();
          const mascotRect = mascot.getBoundingClientRect();
          if (newLeft < 0) newLeft = 0;
          if (newLeft > parentRect.width - mascotRect.width) newLeft = parentRect.width - mascotRect.width;
          if (newTop < 0) newTop = 0;
          if (newTop > parentRect.height - mascotRect.height) newTop = parentRect.height - mascotRect.height;
        } else {
          const mascotRect = mascot.getBoundingClientRect();
          if (newLeft < 0) newLeft = 0;
          if (newLeft > window.innerWidth - mascotRect.width) newLeft = window.innerWidth - mascotRect.width;
          if (newTop < 0) newTop = 0;
          if (newTop > window.innerHeight - mascotRect.height) newTop = window.innerHeight - mascotRect.height;
        }

        mascot.style.left = newLeft + 'px';
        mascot.style.top = newTop + 'px';
      };

      const dragEnd = () => {
        isDragging = false;
        img.classList.remove('mascot-neon-shake');
        
        const pageKey = 'scam_mascot_pos_' + window.location.pathname.split('/').pop().replace('.html', '');
        localStorage.setItem(pageKey, JSON.stringify({ left: mascot.style.left, top: mascot.style.top }));
      };

      mascot.addEventListener('mousedown', dragStart);
      window.addEventListener('mousemove', dragMove);
      window.addEventListener('mouseup', dragEnd);

      mascot.addEventListener('touchstart', dragStart, { passive: true });
      window.addEventListener('touchmove', dragMove, { passive: false });
      window.addEventListener('touchend', dragEnd);

      // 載入該頁之前擺放的位置
      const pageKey = 'scam_mascot_pos_' + window.location.pathname.split('/').pop().replace('.html', '');
      const savedPos = localStorage.getItem(pageKey);
      if (savedPos) {
        try {
          const pos = JSON.parse(savedPos);
          mascot.style.bottom = 'auto';
          mascot.style.left = pos.left;
          mascot.style.top = pos.top;
        } catch (err) {}
      }
    })();
  </script>
  <!-- 可拖曳吉祥物 LiyuChillGuy 結束 -->
