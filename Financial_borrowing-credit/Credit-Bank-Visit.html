<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>【借貸與信用】單元三 活動一：社區金融好厝邊 | 互動學習單</title>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Font Awesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- Google Fonts: Noto Sans TC -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
  <!-- html2canvas -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  
  <style>
    body {
      font-family: 'Noto Sans TC', sans-serif;
    }
    @keyframes neon-rainbow {
      0% { filter: drop-shadow(0 0 6px rgba(245, 158, 11, 0.9)); }
      50% { filter: drop-shadow(0 0 6px rgba(217, 119, 6, 0.9)); }
      100% { filter: drop-shadow(0 0 6px rgba(245, 158, 11, 0.9)); }
    }
    @keyframes mascot-shake {
      0% { transform: scale(1) rotate(0deg); }
      10% { transform: scale(1.05) rotate(-2deg); }
      20% { transform: scale(1.05) rotate(2deg); }
      30% { transform: scale(1.05) rotate(-1deg); }
      40% { transform: scale(1.05) rotate(1deg); }
      50% { transform: scale(1) rotate(0deg); }
    }
    .mascot-neon-shake {
      animation: neon-rainbow 1.5s linear infinite, mascot-shake 0.4s ease-in-out infinite;
    }
    @media print {
      .no-print { display: none !important; }
      body { background-color: #ffffff !important; }
      .print-shadow-none { box-shadow: none !important; border: 1px solid #e2e8f0 !important; }
    }
  </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-800 antialiased flex flex-col justify-between">

  <!-- 主內容區 -->
  <div id="capture-area" class="w-full max-w-5xl mx-auto px-4 py-8 md:px-8 bg-slate-50 flex-grow flex flex-col justify-between relative">
    
    <div>
      <!-- 導航條 -->
      <div class="no-print mb-6">
        <a href="index.html" class="inline-flex items-center gap-2 text-sm font-bold text-amber-600 hover:text-amber-850 transition">
          <i class="fa-solid fa-arrow-left-long"></i> 返回儀表板
        </a>
      </div>

      <!-- 學生資訊區 -->
      <div class="flex flex-col md:flex-row md:items-center md:justify-between border-b-2 border-dashed border-slate-200 pb-6 mb-6">
        <div>
          <span class="inline-block bg-amber-100 text-amber-800 font-extrabold text-xs px-3 py-1.5 rounded-full mb-2 tracking-wider">單元三：借貸「金」厲害</span>
          <h1 class="text-2xl md:text-3xl font-black text-slate-900 tracking-tight flex items-center gap-2.5">
            <span class="p-2.5 bg-amber-500 text-white rounded-xl shadow-md shadow-amber-500/20 flex items-center justify-center">
              <i class="fa-solid fa-building-columns"></i>
            </span>
            活動一：社區金融好厝邊參訪紀錄
          </h1>
        </div>
        
        <div id="student-info-container" class="mt-4 md:mt-0 flex gap-4 items-center">
          <div class="bg-white px-5 py-3 rounded-xl border border-slate-200 shadow-sm flex flex-wrap gap-4 items-center" id="class-name-inputs">
            <div class="flex items-center gap-2">
              <span class="text-slate-600 font-bold text-sm flex-shrink-0">班級：</span>
              <input type="text" id="student-class" placeholder="請輸入班級" class="w-20 bg-slate-50 border border-slate-200 rounded-lg px-2 py-1.5 text-xs font-semibold text-slate-800 focus:outline-none focus:border-amber-500 transition">
            </div>
            <div class="flex items-center gap-2">
              <span class="text-slate-600 font-bold text-sm flex-shrink-0">姓名：</span>
              <input type="text" id="student-name" placeholder="請輸入姓名" class="w-20 bg-slate-50 border border-slate-200 rounded-lg px-2 py-1.5 text-xs font-semibold text-slate-800 focus:outline-none focus:border-amber-500 transition">
            </div>
          </div>
        </div>
      </div>

      <!-- 參訪基本資訊 -->
      <div class="bg-white rounded-2xl border border-slate-200 p-6 shadow-sm mb-6 print-shadow-none">
        <h2 class="text-xs font-black text-slate-400 mb-4 uppercase tracking-wider border-b border-slate-100 pb-2">A. 參訪基本資訊</h2>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 text-xs font-semibold text-slate-700">
          <div>
            <label class="block text-slate-800 mb-1 font-bold">1. 參訪日期</label>
            <input type="date" id="visit_date" class="w-full bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 text-xs font-semibold focus:outline-none focus:border-amber-500 transition shadow-inner">
          </div>
          <div>
            <label class="block text-slate-800 mb-1 font-bold">2. 參訪機構名稱</label>
            <input type="text" id="visit_bank_name" placeholder="例如：大安郵局、台灣銀行" class="w-full bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 text-xs font-semibold focus:outline-none focus:border-amber-500 transition shadow-inner">
          </div>
          <div>
            <label class="block text-slate-800 mb-1 font-bold">3. 機構類型</label>
            <select id="visit_bank_type" class="w-full bg-slate-50 border border-slate-200 rounded-lg px-3 py-1.5 text-xs font-semibold focus:outline-none focus:border-amber-500 transition shadow-inner">
              <option value="商業銀行">商業銀行 (例如：台灣銀行、合作金庫)</option>
              <option value="郵局">郵局 (中華郵政)</option>
              <option value="信用合作社/農漁會">信用合作社 / 農漁會信用部</option>
            </select>
          </div>
        </div>
      </div>

      <!-- 參訪學習觀察 (問題一至八，完整補全) -->
      <div class="bg-white rounded-2xl border border-slate-200 p-6 shadow-sm mb-6 print-shadow-none">
        <h2 class="text-xs font-black text-slate-400 mb-4 uppercase tracking-wider border-b border-slate-100 pb-2">B. 社區金融機構觀察引導問題</h2>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-5 text-xs font-semibold text-slate-700">
          <!-- Q1 -->
          <div>
            <label class="block text-slate-800 mb-1.5 font-bold">一、 請問你知道學校附近有哪些金融機構嗎？</label>
            <textarea id="sz_q_near_banks" rows="2" placeholder="請列出學校附近的銀行、郵局或信用合作社名稱..." class="w-full bg-slate-50 border border-slate-200 rounded-lg p-2.5 resize-none focus:outline-none focus:border-amber-500 shadow-inner leading-relaxed"></textarea>
          </div>
          <!-- Q2 -->
          <div>
            <label class="block text-slate-800 mb-1.5 font-bold">二、 觀察我們參訪的金融機構，主要的業務有哪些？</label>
            <textarea id="sz_q_main_services" rows="2" placeholder="例如：存錢提錢、開戶、換匯、繳費、申辦信用卡、個人貸款、房屋貸款、購買基金理財等..." class="w-full bg-slate-50 border border-slate-200 rounded-lg p-2.5 resize-none focus:outline-none focus:border-amber-500 shadow-inner leading-relaxed"></textarea>
          </div>
          <!-- Q3 -->
          <div class="md:col-span-2 bg-amber-50/20 p-4 rounded-xl border border-amber-100/60">
            <label class="block text-slate-900 mb-1.5 font-extrabold flex items-center gap-1.5">
              <i class="fa-solid fa-shield-halved text-amber-600"></i>
              三、 為保障存款人權益、維護信用秩序及促進金融業務健全發展，金融機構應向中央存款保險公司投保存款保險，請問你知道每一存款人，在國內同一家要保機構的存款保險保障最高額度是多少嗎？
            </label>
            <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 mt-2">
              <textarea id="sz_q_deposit_insurance" rows="2" placeholder="請寫出保障最高額度及原因（提示：存款保險保障限額為新台幣幾百萬元？）..." class="w-full md:w-3/4 bg-white border border-slate-200 rounded-lg p-2.5 resize-none focus:outline-none focus:border-amber-500 shadow-inner leading-relaxed"></textarea>
              <div class="flex flex-col gap-1.5 no-print text-[11px] font-black text-slate-600 flex-shrink-0">
                <span>常見提示額度：</span>
                <div class="flex gap-2">
                  <button type="button" onclick="setInsuranceVal('新台幣 300 萬元')" class="bg-amber-100 hover:bg-amber-200 text-amber-800 px-2.5 py-1 rounded transition">300 萬元</button>
                  <button type="button" onclick="setInsuranceVal('新台幣 100 萬元')" class="bg-slate-100 hover:bg-slate-200 text-slate-700 px-2.5 py-1 rounded transition">100 萬元</button>
                  <button type="button" onclick="setInsuranceVal('新台幣 500 萬元')" class="bg-slate-100 hover:bg-slate-200 text-slate-700 px-2.5 py-1 rounded transition">500 萬元</button>
                </div>
              </div>
            </div>
          </div>
          <!-- Q4 -->
          <div>
            <label class="block text-slate-800 mb-1.5 font-bold">四、 請寫出年滿 18 歲之成年人臨櫃開戶要帶什麼？</label>
            <textarea id="sz_q_open_account" rows="2" placeholder="例如：國民身分證（第一證件）、健保卡或駕照（第二證件）、個人印章、開戶起存額現金（如一千元）..." class="w-full bg-slate-50 border border-slate-200 rounded-lg p-2.5 resize-none focus:outline-none focus:border-amber-500 shadow-inner leading-relaxed"></textarea>
          </div>
          <!-- Q5 -->
          <div>
            <label class="block text-slate-800 mb-1.5 font-bold">五、 請問定期儲蓄存款有哪些種類？</label>
            <textarea id="sz_q_deposit_types" rows="2" placeholder="例如：整存整付（一次存入，到期取本息）、存本取息（存入本金，按月取息，到期還本）、零存整付（按月存入，到期一次取本息）..." class="w-full bg-slate-50 border border-slate-200 rounded-lg p-2.5 resize-none focus:outline-none focus:border-amber-500 shadow-inner leading-relaxed"></textarea>
          </div>
          <!-- Q6 -->
          <div>
            <label class="block text-slate-800 mb-1.5 font-bold">六、 如果未來有借款需求，借款前要先考慮哪些事情？如何作可以累積信用讓銀行願意借錢？</label>
            <textarea id="sz_q_borrow_credit" rows="3" placeholder="例如：需考慮還款能力、借款目的、利率高低。累積信用方法：申辦信用卡並按時全額還清、穩定工作收入、不頻繁向多家銀行申請信貸..." class="w-full bg-slate-50 border border-slate-200 rounded-lg p-2.5 resize-none focus:outline-none focus:border-amber-500 shadow-inner leading-relaxed"></textarea>
          </div>
          <!-- Q7 -->
          <div>
            <label class="block text-slate-800 mb-1.5 font-bold">七、 如果借款後不能準時還款，會有什麼後果？</label>
            <textarea id="sz_q_overdue_effect" rows="3" placeholder="例如：會產生滯納金與高額違約利息；個人信用評分下降（留下不良信用紀錄）；被銀行催收；未來無法再辦卡或貸款，甚至薪資遭強制扣押..." class="w-full bg-slate-50 border border-slate-200 rounded-lg p-2.5 resize-none focus:outline-none focus:border-amber-500 shadow-inner leading-relaxed"></textarea>
          </div>
        </div>
      </div>

      <!-- C. 參訪心得與反思 (問題八) -->
      <div class="bg-white rounded-2xl border border-slate-200 p-6 shadow-sm mb-6 print-shadow-none">
        <h2 class="text-xs font-black text-slate-400 mb-2 uppercase tracking-wider border-b border-slate-100 pb-2">C. 八、 參訪心得與反思</h2>
        <label class="block text-xs font-bold text-slate-800 mb-2">針對社區金融機構參訪活動，讓你印象最深刻的是什麼？請寫下參訪心得：</label>
        <textarea id="visit_reflections" rows="4" placeholder="請自由填寫參訪心得。例如：今天參訪了郵局與銀行，看見行員熟練地處理開戶與防範詐騙宣導，也學習到信用是無形的資產，存款保險能保障我們的資產安全。這堂課讓我了解未來與銀行打交道時，維護誠信的決定性作用..." class="w-full bg-slate-50 border border-slate-200 rounded-lg p-3 resize-none focus:outline-none focus:border-amber-500 shadow-inner leading-relaxed text-xs font-semibold"></textarea>
      </div>

    </div>

    <!-- 底部按鈕與頁尾 -->
    <div class="mt-8">
      <div class="no-print flex flex-wrap justify-center gap-4 mb-6">
        <button id="btn-clear" class="no-print inline-flex items-center gap-2 bg-slate-200 hover:bg-slate-300 text-slate-700 font-extrabold text-sm px-6 py-3 rounded-xl shadow-sm transition-all transform active:scale-95">
          <i class="fa-solid fa-trash-can"></i>
          重設學習單
        </button>
        <button id="btn-download" class="inline-flex items-center gap-2 bg-amber-600 hover:bg-amber-700 text-white font-extrabold text-sm px-6 py-3 rounded-xl shadow-md shadow-amber-600/10 transition-all transform hover:-translate-y-0.5 active:translate-y-0">
          <i class="fa-solid fa-cloud-arrow-down"></i>
          下載學習單 (PNG)
        </button>
      </div>

      <div class="text-center border-t border-slate-200/60 pt-6">
        <div class="flex justify-center mb-3">
          <a href="https://www.facebook.com/happyliyuchilltiger/" target="_blank" class="inline-flex items-center gap-2 bg-blue-50 text-blue-700 hover:bg-blue-100 font-bold text-xs px-3.5 py-2 rounded-full border border-blue-100 transition-all">
            <svg class="w-4 h-4 text-blue-600 fill-current" viewBox="0 0 24 24">
              <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
            </svg>
            快樂鯉魚秋老虎
          </a>
        </div>
        <p class="text-[11px] text-slate-400 font-bold tracking-wider uppercase">
          Copyright © Liyuchiutiger Gongminshen
        </p>
      </div>
    </div>

  </div>

  <!-- Toast -->
  <div id="toast" class="no-print fixed bottom-6 left-1/2 transform -translate-x-1/2 bg-slate-900 text-white text-xs font-bold px-4 py-3 rounded-xl shadow-lg opacity-0 transition-opacity duration-300 pointer-events-none flex items-center gap-2 z-50">
    <i id="toast-icon" class="fa-solid fa-circle-check text-amber-500"></i>
    <span id="toast-message">提示訊息</span>
  </div>

  <!-- 可拖曳吉祥物 LiyuChillGuy -->
  <div id="draggable-mascot" class="no-print fixed bottom-6 left-6 z-50 select-none" style="width: 160px; height: 160px; touch-action: none;">
    <img src="image/LiyuChillGuy.svg" alt="LiyuChillGuy" class="w-full h-full object-contain cursor-grab active:cursor-grabbing transition-shadow" id="mascot-img">
  </div>

  <script>
    const storagePrefix = 'credit_bank_visit_v3_';
    
    // 文字與問答 ID
    const textIds = [
      'student-class', 'student-name', 'visit_date', 'visit_bank_name', 'visit_bank_type',
      'sz_q_near_banks', 'sz_q_main_services', 'sz_q_deposit_insurance',
      'sz_q_open_account', 'sz_q_deposit_types', 'sz_q_borrow_credit', 'sz_q_overdue_effect',
      'visit_reflections'
    ];

    // 初始化與快取載入
    function initStorage() {
      textIds.forEach(id => {
        const val = localStorage.getItem(storagePrefix + id);
        if (val) document.getElementById(id).value = val;
        document.getElementById(id).addEventListener('input', (e) => {
          localStorage.setItem(storagePrefix + id, e.target.value);
        });
      });

      initMascot();
    }

    // 提示額度按鈕輔助輸入
    function setInsuranceVal(val) {
      const area = document.getElementById('sz_q_deposit_insurance');
      area.value = `我國中央存款保險每一存款人最高保障額度為【${val}】。保障範圍包括新台幣存款、外幣存款及利息。`;
      localStorage.setItem(storagePrefix + 'sz_q_deposit_insurance', area.value);
      showToast('已填入提示額度！');
    }

    // 訊息 Toast
    function showToast(message, type = 'success') {
      const toast = document.getElementById('toast');
      const toastMessage = document.getElementById('toast-message');
      const toastIcon = document.getElementById('toast-icon');
      
      toastMessage.textContent = message;
      if (type === 'success') {
        toastIcon.className = "fa-solid fa-circle-check text-emerald-400";
      } else {
        toastIcon.className = "fa-solid fa-circle-xmark text-rose-400";
      }
      
      toast.classList.remove('opacity-0', 'pointer-events-none');
      setTimeout(() => {
        toast.classList.add('opacity-0', 'pointer-events-none');
      }, 2000);
    }

    // 重設
    document.getElementById('btn-clear').addEventListener('click', () => {
      if (confirm('確定要清除這張好厝邊參訪學習單的所有作答狀態嗎？')) {
        textIds.forEach(id => {
          localStorage.removeItem(storagePrefix + id);
          document.getElementById(id).value = '';
        });
        document.getElementById('visit_bank_type').value = '商業銀行';
        showToast('學習單已重設！');
      }
    });

    // 下載成果 (通用高保真靜態化)
    document.getElementById('btn-download').addEventListener('click', async () => {
      const captureArea = document.getElementById('capture-area');
      const downloadBtn = document.getElementById('btn-download');
      
      const originalBtnText = downloadBtn.innerHTML;
      downloadBtn.innerHTML = `<i class="fa-solid fa-spinner animate-spin"></i> 正在生成學習單...`;
      downloadBtn.disabled = true;

      const originalStyleWidth = captureArea.style.width;
      const originalStyleMaxWidth = captureArea.style.maxWidth;
      captureArea.style.width = '1024px';
      captureArea.style.maxWidth = '1024px';

      const classVal = document.getElementById('student-class').value || '未填寫';
      const nameVal = document.getElementById('student-name').value || '未填寫';

      // 建立臨時的列印用學生資訊區
      const printInfoDiv = document.createElement('div');
      printInfoDiv.id = 'temp-student-info-print';
      printInfoDiv.className = 'flex gap-6 items-center text-slate-700 text-sm font-extrabold flex-shrink-0';
      printInfoDiv.innerHTML = `<div>班級：<span class="border-b border-slate-400 pb-0.5 px-3 text-amber-800 font-extrabold text-sm">${classVal}</span></div>` +
                               `<div>姓名：<span class="border-b border-slate-400 pb-0.5 px-3 text-amber-800 font-extrabold text-sm">${nameVal}</span></div>`;

      const inputsWrapper = document.getElementById('class-name-inputs');
      inputsWrapper.style.display = 'none';
      inputsWrapper.parentNode.insertBefore(printInfoDiv, inputsWrapper);

      // 通用靜態化替換：把 CaptureArea 內所有的 textarea / input[type="text"] / input[type="date"] / select 替換為靜態 div
      const tempElements = [];
      
      const textareas = captureArea.querySelectorAll('textarea');
      textareas.forEach(ta => {
        const div = document.createElement('div');
        div.className = 'w-full bg-white border border-slate-200 rounded-lg p-2.5 text-xs text-amber-850 font-semibold shadow-inner min-h-[50px] whitespace-pre-wrap flex items-center';
        div.textContent = ta.value || '（未填寫）';
        ta.style.display = 'none';
        ta.parentNode.insertBefore(div, ta);
        tempElements.push({ original: ta, temp: div });
      });

      const inputs = captureArea.querySelectorAll('input[type="text"], input[type="date"]');
      inputs.forEach(inp => {
        const div = document.createElement('div');
        div.className = 'w-full bg-white border border-slate-200 rounded px-2.5 py-1.5 text-xs text-amber-850 font-semibold shadow-inner text-center inline-block';
        div.textContent = inp.value || '（未填寫）';
        inp.style.display = 'none';
        inp.parentNode.insertBefore(div, inp);
        tempElements.push({ original: inp, temp: div });
      });

      const selects = captureArea.querySelectorAll('select');
      selects.forEach(sel => {
        const div = document.createElement('div');
        div.className = 'w-full bg-white border border-slate-200 rounded px-2.5 py-1.5 text-xs text-amber-850 font-semibold shadow-inner text-center inline-block';
        div.textContent = sel.options[sel.selectedIndex].text;
        sel.style.display = 'none';
        sel.parentNode.insertBefore(div, sel);
        tempElements.push({ original: sel, temp: div });
      });

      try {
        const canvas = await html2canvas(captureArea, {
          scale: 2,
          windowWidth: 1024,
          backgroundColor: '#f8fafc',
          useCORS: true,
          allowTaint: false,
          logging: false,
          ignoreElements: (element) => {
            return element.id === 'draggable-mascot' || 
                   (element.tagName === 'LINK' && element.href && element.href.includes('fonts.googleapis.com')) ||
                   (element.tagName === 'LINK' && element.href && element.href.includes('fonts.gstatic.com'));
          }
        });

        const link = document.createElement('a');
        link.download = `借貸與信用_單元三_活動一_社區金融好厝邊參訪_${nameVal}.png`;
        link.href = canvas.toDataURL('image/png');
        link.click();
        showToast('學習單成果下載成功！');
      } catch (err) {
        console.error(err);
        showToast('產生圖片失敗，請重試。', 'error');
      } finally {
        captureArea.style.width = originalStyleWidth;
        captureArea.style.maxWidth = originalStyleMaxWidth;
        printInfoDiv.remove();
        inputsWrapper.style.display = 'flex';
        tempElements.forEach(item => {
          item.temp.remove();
          item.original.style.display = 'inline-block';
          if (item.original.tagName === 'TEXTAREA') {
            item.original.style.display = 'block';
          }
        });
        downloadBtn.innerHTML = originalBtnText;
        downloadBtn.disabled = false;
      }
    });

    // 吉祥物拖曳
    function initMascot() {
      const mascot = document.getElementById('draggable-mascot');
      const img = document.getElementById('mascot-img');
      const captureArea = document.getElementById('capture-area');

      captureArea.appendChild(mascot);
      mascot.style.position = 'absolute';

      img.addEventListener('mouseenter', () => img.classList.add('mascot-neon-shake'));
      img.addEventListener('mouseleave', () => img.classList.remove('mascot-neon-shake'));

      let isDragging = false;
      let startX, startY, initialLeft, initialTop;

      const dragStart = (e) => {
        isDragging = true;
        img.classList.add('mascot-neon-shake');

        initialLeft = mascot.offsetLeft;
        initialTop = mascot.offsetTop;

        startX = e.touches ? e.touches[0].clientX : e.clientX;
        startY = e.touches ? e.touches[0].clientY : e.clientY;

        mascot.style.bottom = 'auto';
        mascot.style.left = initialLeft + 'px';
        mascot.style.top = initialTop + 'px';
      };

      const dragMove = (e) => {
        if (!isDragging) return;
        e.preventDefault();

        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;

        const dx = clientX - startX;
        const dy = clientY - startY;

        const parentRect = captureArea.getBoundingClientRect();
        const mascotRect = mascot.getBoundingClientRect();

        let newLeft = initialLeft + dx;
        let newTop = initialTop + dy;

        if (newLeft < 0) newLeft = 0;
        if (newLeft > parentRect.width - mascotRect.width) newLeft = parentRect.width - mascotRect.width;
        if (newTop < 0) newTop = 0;
        if (newTop > parentRect.height - mascotRect.height) newTop = parentRect.height - mascotRect.height;

        mascot.style.left = newLeft + 'px';
        mascot.style.top = newTop + 'px';
      };

      const dragEnd = () => {
        isDragging = false;
        img.classList.remove('mascot-neon-shake');
        
        const pageKey = 'credit_mascot_pos_' + window.location.pathname.split('/').pop().replace('.html', '');
        localStorage.setItem(pageKey, JSON.stringify({ left: mascot.style.left, top: mascot.style.top }));
      };

      mascot.addEventListener('mousedown', dragStart);
      window.addEventListener('mousemove', dragMove);
      window.addEventListener('mouseup', dragEnd);

      mascot.addEventListener('touchstart', dragStart, { passive: true });
      window.addEventListener('touchmove', dragMove, { passive: false });
      window.addEventListener('touchend', dragEnd);

      const pageKey = 'credit_mascot_pos_' + window.location.pathname.split('/').pop().replace('.html', '');
      const savedPos = localStorage.getItem(pageKey);
      if (savedPos) {
        try {
          const pos = JSON.parse(savedPos);
          mascot.style.bottom = 'auto';
          mascot.style.left = pos.left;
          mascot.style.top = pos.top;
        } catch (err) {}
      }
    }

    window.onload = initStorage;
  </script>
