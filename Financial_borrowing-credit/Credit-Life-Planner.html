  <script>
    const storagePrefix = 'credit_planner_';
    let selectedFamilyKey = '';
    let monthlyIncome = 0;

    function selectFamily(key, income) {
      selectedFamilyKey = key;
      monthlyIncome = income;
      localStorage.setItem(storagePrefix + 'selected_family', key);
      localStorage.setItem(storagePrefix + 'income', income);

      // UI 視覺反饋
      const btns = document.querySelectorAll('.family-btn');
      btns.forEach(btn => {
        btn.className = "family-btn border-2 border-slate-200 rounded-xl p-4 bg-slate-50 hover:bg-amber-50/20 hover:border-amber-500 transition text-left flex flex-col justify-between min-h-[110px]";
      });

      const selectedBtn = document.getElementById('btn_family_' + key);
      selectedBtn.className = "family-btn border-2 border-amber-500 rounded-xl p-4 bg-amber-50/10 transition text-left flex flex-col justify-between min-h-[110px] shadow-sm";

      recalc();
    }

    function recalc() {
      // 統計支出
      let totalExpense = 0;
      const expenseGroups = ['house', 'food', 'traffic', 'invest', 'edu'];
      expenseGroups.forEach(grp => {
        const radios = document.getElementsByName('expense_' + grp);
        for (let r of radios) {
          if (r.checked) {
            totalExpense += parseInt(r.value);
            localStorage.setItem(storagePrefix + 'radio_' + grp, r.value);
            break;
          }
        }
      });

      // 更新看板
      document.getElementById('res_income').textContent = monthlyIncome.toLocaleString() + ' 元';
      document.getElementById('res_expense').textContent = totalExpense.toLocaleString() + ' 元';

      const balance = monthlyIncome - totalExpense;
      document.getElementById('res_balance').textContent = balance.toLocaleString() + ' 元';

      const balanceCard = document.getElementById('res_balance_card');
      const balanceVal = document.getElementById('res_balance');
      const statusMsg = document.getElementById('res_status_message');

      if (!selectedFamilyKey) {
        statusMsg.textContent = '請先選擇頂部的一種家庭型態！';
        statusMsg.className = "text-xs font-bold p-3 rounded-lg text-center bg-slate-100 text-slate-650";
        balanceCard.className = "p-4 rounded-xl border bg-slate-50 border-slate-200";
        balanceVal.className = "text-2xl font-black text-slate-800";
        return;
      }

      if (balance < 0) {
        statusMsg.textContent = '警告：預算超支！建議調降某些高額生活選擇，或考量理財儲蓄規避赤字風險。';
        statusMsg.className = "text-xs font-bold p-3 rounded-lg text-center bg-rose-50 text-rose-700 border border-rose-100";
        balanceCard.className = "p-4 rounded-xl border bg-rose-50 border-rose-200";
        balanceVal.className = "text-2xl font-black text-rose-600";
      } else {
        statusMsg.textContent = '預算平衡！有健康的儲蓄盈餘，可作為未來備用金或中長期投資。';
        statusMsg.className = "text-xs font-bold p-3 rounded-lg text-center bg-emerald-50 text-emerald-700 border border-emerald-100";
        balanceCard.className = "p-4 rounded-xl border bg-emerald-50 border-emerald-200";
        balanceVal.className = "text-2xl font-black text-emerald-600";
      }
    }

    function initStorage() {
      // 載入家庭型態
      const savedFamily = localStorage.getItem(storagePrefix + 'selected_family');
      if (savedFamily) {
        const savedIncome = parseInt(localStorage.getItem(storagePrefix + 'income') || 0);
        selectFamily(savedFamily, savedIncome);
      }

      // 載入支出勾選
      const expenseGroups = ['house', 'food', 'traffic', 'invest', 'edu'];
      expenseGroups.forEach(grp => {
        const savedVal = localStorage.getItem(storagePrefix + 'radio_' + grp);
        if (savedVal !== null) {
          const radios = document.getElementsByName('expense_' + grp);
          for (let r of radios) {
            if (r.value === savedVal) {
              r.checked = true;
              break;
            }
          }
        }
      });

      // 載入文字回答
      const challengeVal = localStorage.getItem(storagePrefix + 'ref_challenge');
      if (challengeVal) document.getElementById('ref_challenge').value = challengeVal;
      document.getElementById('ref_challenge').addEventListener('input', (e) => {
        localStorage.setItem(storagePrefix + 'ref_challenge', e.target.value);
      });

      const loanToolsVal = localStorage.getItem(storagePrefix + 'ref_loan_tools');
      if (loanToolsVal) document.getElementById('ref_loan_tools').value = loanToolsVal;
      document.getElementById('ref_loan_tools').addEventListener('input', (e) => {
        localStorage.setItem(storagePrefix + 'ref_loan_tools', e.target.value);
      });

      const sClass = localStorage.getItem(storagePrefix + 'student_class');
      if (sClass) document.getElementById('student-class').value = sClass;
      document.getElementById('student-class').addEventListener('input', (e) => {
        localStorage.setItem(storagePrefix + 'student_class', e.target.value);
      });

      const sName = localStorage.getItem(storagePrefix + 'student_name');
      if (sName) document.getElementById('student-name').value = sName;
      document.getElementById('student-name').addEventListener('input', (e) => {
        localStorage.setItem(storagePrefix + 'student_name', e.target.value);
      });

      recalc();
      initMascot();
    }

    function showToast(message, type = 'success') {
      const toast = document.getElementById('toast');
      const toastMessage = document.getElementById('toast-message');
      const toastIcon = document.getElementById('toast-icon');
      
      toastMessage.textContent = message;
      if (type === 'success') {
        toastIcon.className = "fa-solid fa-circle-check text-emerald-400";
      } else {
        toastIcon.className = "fa-solid fa-circle-xmark text-rose-400";
      }
      
      toast.classList.remove('opacity-0', 'pointer-events-none');
      setTimeout(() => {
        toast.classList.add('opacity-0', 'pointer-events-none');
      }, 2000);
    }

    // --- 重設 ---
    document.getElementById('btn-clear').addEventListener('click', () => {
      if (confirm('確定要清除這張收支規劃學習單的所有狀態嗎？')) {
        localStorage.removeItem(storagePrefix + 'selected_family');
        localStorage.removeItem(storagePrefix + 'income');
        selectedFamilyKey = '';
        monthlyIncome = 0;

        const btns = document.querySelectorAll('.family-btn');
        btns.forEach(btn => {
          btn.className = "family-btn border-2 border-slate-200 rounded-xl p-4 bg-slate-50 hover:bg-amber-50/20 hover:border-amber-500 transition text-left flex flex-col justify-between min-h-[110px]";
        });

        const expenseGroups = ['house', 'food', 'traffic', 'invest', 'edu'];
        expenseGroups.forEach(grp => {
          localStorage.removeItem(storagePrefix + 'radio_' + grp);
          const radios = document.getElementsByName('expense_' + grp);
          for (let r of radios) r.checked = false;
        });

        localStorage.removeItem(storagePrefix + 'ref_challenge');
        localStorage.removeItem(storagePrefix + 'ref_loan_tools');
        document.getElementById('ref_challenge').value = '';
        document.getElementById('ref_loan_tools').value = '';

        localStorage.removeItem(storagePrefix + 'student_class');
        localStorage.removeItem(storagePrefix + 'student_name');
        document.getElementById('student-class').value = '';
        document.getElementById('student-name').value = '';
        
        recalc();
        showToast('學習單已重設！');
      }
    });

    // --- 下載 ---
    document.getElementById('btn-download').addEventListener('click', async () => {
      const captureArea = document.getElementById('capture-area');
      const downloadBtn = document.getElementById('btn-download');
      
      const originalBtnText = downloadBtn.innerHTML;
      downloadBtn.innerHTML = `<i class="fa-solid fa-spinner animate-spin"></i> 正在生成學習單...`;
      downloadBtn.disabled = true;

      const originalStyleWidth = captureArea.style.width;
      const originalStyleMaxWidth = captureArea.style.maxWidth;
      captureArea.style.width = '1024px';
      captureArea.style.maxWidth = '1024px';

      const classVal = document.getElementById('student-class').value || '未填寫';
      const nameVal = document.getElementById('student-name').value || '未填寫';

      // 建立臨時的列印用學生資訊區
      const printInfoDiv = document.createElement('div');
      printInfoDiv.id = 'temp-student-info-print';
      printInfoDiv.className = 'flex gap-6 items-center text-slate-700 text-sm font-extrabold flex-shrink-0';
      printInfoDiv.innerHTML = `<div>班級：<span class="border-b border-slate-400 pb-0.5 px-3 text-amber-700 font-extrabold text-sm">${classVal}</span></div>` +
                               `<div>姓名：<span class="border-b border-slate-400 pb-0.5 px-3 text-amber-700 font-extrabold text-sm">${nameVal}</span></div>`;

      const inputsWrapper = document.getElementById('class-name-inputs');
      inputsWrapper.style.display = 'none';
      inputsWrapper.parentNode.insertBefore(printInfoDiv, inputsWrapper);

      // Textarea 替換
      const textIds = ['ref_challenge', 'ref_loan_tools'];
      const tempElements = [];
      textIds.forEach(id => {
        const inp = document.getElementById(id);
        const val = inp.value || '（未填寫）';
        
        const tDiv = document.createElement('div');
        tDiv.className = 'w-full bg-white border border-slate-200 rounded-lg p-2.5 text-xs text-amber-800 font-semibold shadow-inner min-h-[60px] whitespace-pre-wrap';
        tDiv.textContent = val;
        
        inp.style.display = 'none';
        inp.parentNode.insertBefore(tDiv, inp);
        tempElements.push({ original: inp, temp: tDiv });
      });

      try {
        const canvas = await html2canvas(captureArea, {
          scale: 2,
          windowWidth: 1024,
          backgroundColor: '#f8fafc',
          useCORS: true,
          allowTaint: false,
          logging: false,
          ignoreElements: (element) => {
            // 忽略吉祥物與外部字型 link 以防 CORS 污染 canvas 導致匯出失敗
            return element.id === 'draggable-mascot' || 
                   (element.tagName === 'LINK' && element.href && element.href.includes('fonts.googleapis.com')) ||
                   (element.tagName === 'LINK' && element.href && element.href.includes('fonts.gstatic.com'));
          }
        });

        const link = document.createElement('a');
        link.download = `借貸與信用_活動三_人生收支規劃師_${nameVal}.png`;
        link.href = canvas.toDataURL('image/png');
        link.click();
        showToast('學習單成果下載成功！');
      } catch (err) {
        console.error(err);
        showToast('產生圖片失敗，請重試。', 'error');
      } finally {
        captureArea.style.width = originalStyleWidth;
        captureArea.style.maxWidth = originalStyleMaxWidth;
        printInfoDiv.remove();
        inputsWrapper.style.display = 'flex';
        tempElements.forEach(item => {
          item.temp.remove();
          item.original.style.display = 'block';
        });
        downloadBtn.innerHTML = originalBtnText;
        downloadBtn.disabled = false;
      }
    });

    // --- 吉祥物拖曳 ---
    function initMascot() {
      const mascot = document.getElementById('draggable-mascot');
      if (!mascot) return;
      let isDragging = false;
      let offsetX = 0, offsetY = 0;

      mascot.addEventListener('mousedown', (e) => {
        isDragging = true;
        const rect = mascot.getBoundingClientRect();
        offsetX = e.clientX - rect.left;
        offsetY = e.clientY - rect.top;
        mascot.style.cursor = 'grabbing';
      });

      document.addEventListener('mousemove', (e) => {
        if (!isDragging) return;
        mascot.style.left = (e.clientX - offsetX) + 'px';
        mascot.style.top = (e.clientY - offsetY) + 'px';
        mascot.style.bottom = 'auto';
        mascot.style.right = 'auto';
      });

      document.addEventListener('mouseup', () => {
        isDragging = false;
        mascot.style.cursor = 'grab';
      });

      mascot.addEventListener('touchstart', (e) => {
        isDragging = true;
        const touch = e.touches[0];
        const rect = mascot.getBoundingClientRect();
        offsetX = touch.clientX - rect.left;
        offsetY = touch.clientY - rect.top;
      });

      document.addEventListener('touchmove', (e) => {
        if (!isDragging) return;
        const touch = e.touches[0];
        mascot.style.left = (touch.clientX - offsetX) + 'px';
        mascot.style.top = (touch.clientY - offsetY) + 'px';
        mascot.style.bottom = 'auto';
        mascot.style.right = 'auto';
      });

      document.addEventListener('touchend', () => {
        isDragging = false;
      });
    }

    window.onload = initStorage;
  </script>
</body>
</html>
